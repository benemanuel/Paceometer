<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#0f172a" rx="45"/>

  <!-- Outer circle (gauge body) -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#1e293b" stroke-width="8"/>

  <!-- Arc background (slate) -->
  <path d="M 40 96 A 56 56 0 0 1 152 96" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round"/>

  <!-- Hyperbolic arc (orange - the pace scale) -->
  <path d="M 45 96 A 51 51 0 0 1 147 96" fill="none" stroke="#fb923c" stroke-width="14" stroke-linecap="round"/>

  <!-- Center circle (needle hub) -->
  <circle cx="96" cy="96" r="12" fill="#ef4444"/>
  <circle cx="96" cy="96" r="8" fill="#1e293b"/>

  <!-- Needle (pointing to ~60 degrees) -->
  <g transform="translate(96, 96) rotate(50)">
    <path d="M 0 -50 L -5 0 L 0 8 L 5 0 Z" fill="#ef4444"/>
  </g>

  <!-- Tick marks around gauge -->
  <g stroke="#e2e8f0" stroke-width="2" stroke-linecap="round">
    <!-- Tick at 0 degrees -->
    <line x1="96" y1="28" x2="96" y2="35"/>
    <!-- Tick at 45 degrees -->
    <line x1="135" y1="41" x2="140" y2="36"/>
    <!-- Tick at 90 degrees -->
    <line x1="164" y1="96" x2="157" y2="96"/>
    <!-- Tick at 135 degrees -->
    <line x1="151" y1="151" x2="146" y2="156"/>
  </g>

  <!-- Speed label at bottom -->
  <text x="96" y="140" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">KM/H</text>
</svg>
